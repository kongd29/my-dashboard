<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>공고 통합 대시보드 (15개 기관 신호등)</title>
  <style>
    :root { --bg:#f6f7fb; --card:#ffffff; --accent:#1d4ed8; --line:#d9dfeb; }
    body { margin:0; font-family: 'Malgun Gothic', sans-serif; background: var(--bg); padding: 25px; }
    .source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 30px; }
    .source-card { background: var(--card); border: 1px solid var(--line); padding: 15px; border-radius: 12px; transition: 0.3s; }

    .status-success { border-top: 5px solid #22c55e; background: #f0fdf4; }
    .status-zero    { border-top: 5px solid #f59e0b; background: #fffbeb; }
    .status-fail    { border-top: 5px solid #ef4444; background: #fef2f2; }
    .status-gated   { border-top: 5px solid #ef4444; background: #fff1f2; }

    .source-card h4 { margin: 0 0 10px 0; font-size: 13px; line-height: 1.2; }
    .meta { font-size: 11px; color:#444; margin-top: 8px; }
    .btn-open { font-size: 11px; text-decoration: none; color: #1d4ed8; font-weight: bold; border: 1px solid #1d4ed8; padding: 4px 8px; border-radius: 6px; }

    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
    th { background: #f8f9fa; padding: 14px; border-bottom: 2px solid var(--line); text-align: left; }
    td { padding: 14px; border-bottom: 1px solid var(--line); font-size: 14px; }
    .is-new { color: red; font-weight: bold; font-size: 11px; margin-right: 5px; }

    .warn {
      margin: 12px 0 18px;
      padding: 12px 14px;
      border: 1px solid #f59e0b;
      background: #fffbeb;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
    }
    code { background:#f1f5f9; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>공고 통합 대시보드 (15개 기관)</h1>
    <p id="updateInfo">수집 중...</p>
  </header>

  <div class="warn" id="serverHint" style="display:none;">
    이 HTML을 파일로 더블클릭(파일://)로 열면 <b>fetch가 차단</b>되어 <code>feed.json</code>을 못 읽습니다.<br/>
    아래 중 하나로 “로컬 서버”를 띄운 뒤 접속하세요:<br/>
    1) <code>npx http-server -p 5500</code><br/>
    2) <code>python -m http.server 5500</code><br/>
    그리고 브라우저에서 <code>http://localhost:5500/공모사업.html</code> 로 접속합니다.
  </div>

  <div class="source-grid" id="sourceGrid"></div>

  <table>
    <thead>
      <tr>
        <th width="170">수집기관</th>
        <th>공고 제목</th>
        <th width="120">공고일</th>
      </tr>
    </thead>
    <tbody id="feedBody"></tbody>
  </table>

<script>
  const SITES = [
    { id: "mss_incheon",  name: "인천중소벤처기업청",           url: "https://www.mss.go.kr/site/incheon/ex/bbs/List.do?cbIdx=248" },
    { id: "kosmes",       name: "중소벤처기업진흥공단",         url: "https://www.kosmes.or.kr/nsh/nt/bbs/getBbsList.do?bbsCategory=01" },
    { id: "smr",          name: "성남상권재단",                 url: "https://www.smr.or.kr/base/board/list?boardManagementNo=1" },
    { id: "gmr",          name: "경기도상권진흥원",             url: "https://www.gmr.or.kr/base/board/list?boardManagementNo=1" },
    { id: "bizok",        name: "비즈오케이(인천)",             url: "https://bizok.incheon.go.kr/open_content/biz.do" },
    { id: "wbiz",         name: "여성기업종합정보포털",         url: "https://www.wbiz.or.kr/notice/biz.do" },
    { id: "semas",        name: "소상공인시장진흥공단",         url: "https://www.semas.or.kr/web/board/webBoardList.do?boardId=30" },
    { id: "insupport",    name: "인천소상공인지원센터",         url: "https://www.insupport.or.kr/sub/sub03_02.php" },
    { id: "nhn_commerce", name: "NHN커머스",                   url: "https://www.nhn-commerce.com/support/notice-list.gd" },
    { id: "gobiz",        name: "고비즈",                       url: "https://kr.gobizkorea.com/customer/notice/noticeList.do" },
    { id: "fanfandaero",  name: "판판대로",                     url: "https://fanfandaero.kr/portal/read/readDetail.do" },
    { id: "sbiz24",       name: "소상공인24",                   url: "https://www.sbiz24.kr/#/combinePblanc" },
    { id: "kodma",        name: "한국소상공인기업총연합회",     url: "https://www.kodma.or.kr/bbs/list.do?&bbs_cd=notice" },
    { id: "ymf_notice",   name: "전통시장육성재단(공지)",       url: "https://www.ymf.or.kr/sub/sub03_03.php" },
    { id: "ymf_related",  name: "전통시장육성재단(유관)",       url: "https://www.ymf.or.kr/sub/sub03_05.php" }
  ];

  function parseDateSafe(s) {
    if (!s) return null;
    const d = new Date(s);
    if (!isFinite(d.getTime())) return null;
    return d;
  }

  function isNewItem(item, generatedAtIso) {
    const gen = parseDateSafe(generatedAtIso);
    const nd = item && item.notice_date ? parseDateSafe(item.notice_date) : null;
    if (gen && nd) {
      const diff = gen.getTime() - nd.getTime();
      const days = diff / (1000 * 60 * 60 * 24);
      return days >= 0 && days <= 7;
    }
    const ca = item && item.collected_at ? parseDateSafe(item.collected_at) : null;
    if (gen && ca) {
      const diff = gen.getTime() - ca.getTime();
      const hours = diff / (1000 * 60 * 60);
      return hours >= 0 && hours <= 24;
    }
    return false;
  }

  async function load() {
    try {
      const res = await fetch("./feed.json", { cache: "no-store" });
      if (!res.ok) throw new Error("feed.json_fetch_failed");
      const data = await res.json();

      const statusMap = data.status || {};
      const generatedAt = data.generated_at || "";

      document.getElementById("sourceGrid").innerHTML = SITES.map(s => {
        const stObj = statusMap[s.id];
        const st = stObj ? stObj.status : null;
        const cls = st ? `status-${st}` : "";
        const cnt = stObj && typeof stObj.count === "number" ? stObj.count : "-";
        const reason = stObj && stObj.reason ? stObj.reason : "";
        const used = stObj && stObj.used ? stObj.used : "";

        const meta = stObj
          ? `상태: ${st} / 건수: ${cnt}${reason ? ` / 사유: ${reason}` : ""}${used ? ` / 방식: ${used}` : ""}`
          : "상태: (미수집)";

        return `
          <div class="source-card ${cls}">
            <h4>${s.name}</h4>
            <a href="${s.url}" target="_blank" class="btn-open">열기</a>
            <div class="meta">${meta}</div>
          </div>
        `;
      }).join("");

      const items = Array.isArray(data.items) ? data.items.slice() : [];
      items.sort((a, b) => {
        const da = parseDateSafe(a.notice_date) || parseDateSafe(a.collected_at) || new Date(0);
        const db = parseDateSafe(b.notice_date) || parseDateSafe(b.collected_at) || new Date(0);
        return db.getTime() - da.getTime();
      });

      document.getElementById("feedBody").innerHTML = items.map(it => {
        const newBadge = isNewItem(it, generatedAt) ? `<span class="is-new">NEW</span>` : "";
        const dateTxt = it.notice_date ? it.notice_date : "-";
        return `
          <tr>
            <td>${it.source_name || "-"}</td>
            <td>${newBadge}<a href="${it.url}" target="_blank" style="text-decoration:none; color:#333;">${it.title || "-"}</a></td>
            <td>${dateTxt}</td>
          </tr>
        `;
      }).join("");

      const okCount = items.length;
      const genDay = generatedAt ? generatedAt.split("T")[0] : "-";
      document.getElementById("updateInfo").textContent = `최종 수집: ${genDay} | 표출: ${okCount}건`;

    } catch (e) {
      console.error(e);
      document.getElementById("updateInfo").textContent =
        "데이터 로드 실패: 로컬 서버로 열었는지 확인하세요 (file://로 열면 실패합니다).";
      document.getElementById("serverHint").style.display = "block";
    }
  }
  load();
</script>
</body>
</html>
